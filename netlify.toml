[build]
  publish = "public"
  # No build command needed — the frontend is static HTML/CSS/JS.
  # showtimes.json is committed by the GitHub Action and deployed with each push.

[[headers]]
  for = "/showtimes.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
